name: Build & Package

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # Release 업로드 권한

# ──────────────────────────────────────────────
jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: app-windows.exe
            pyinstaller_args: --onefile --windowed
          - os: macos-latest
            artifact_name: app-macos
            pyinstaller_args: --onefile --windowed
          - os: ubuntu-latest
            artifact_name: app-linux
            pyinstaller_args: --onefile

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: pip  ← requirements.txt 없으면 오류나므로 비활성화

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt 있으면 설치, 없으면 스킵
          pip install -r requirements.txt || echo "requirements.txt 없음, 스킵"
          pip install pyinstaller PyQt5 mido pygame numpy

      # 4. Linux — GUI 의존 라이브러리 (Qt/Tk 사용 시 필요)
      - name: Install Linux GUI libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xkb1 libxkbcommon-x11-0

      # 5. PyInstaller로 빌드
      - name: Build executable
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} \
            --name "${{ matrix.artifact_name }}" \
            --clean \
            main.py
        # ↑ main.py를 실제 엔트리포인트 파일명으로 변경하세요

      # 6. 결과물 확인
      - name: List dist/
        shell: bash
        run: ls -lh dist/

      # 7. Artifact 업로드 (PR / 브랜치 push)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*
          retention-days: 7

  # ──────────────────────────────────────────────
  # 태그(v*.*.*) push 시에만 GitHub Release 생성
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/**/*
          body: |
            ## 📦 빌드 결과물

            | 플랫폼    | 파일               |
            |-----------|-------------------|
            | Windows   | `app-windows.exe`  |
            | macOS     | `app-macos`        |
            | Linux     | `app-linux`        |

            > 자동 빌드: `${{ github.sha }}`
