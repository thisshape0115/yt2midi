name: Build Glypher Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install PyQt6 PyQt6-Qt6 PyQt6-sip fonttools brotli pyinstaller

      - name: PyInstaller로 EXE 빌드
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Scroller `
            --paths . `
            --add-data "core;core" `
            --add-data "ui;ui" `
            --add-data "data;data" `
            --add-data "export;export" `
            --collect-all PyQt6 `
            --hidden-import PyQt6.QtSvg `
            --hidden-import PyQt6.QtXml `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets `
            midi_player.py

      - name: EXE 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Scroller
          path: dist/Scroller.exe
          retention-days: 30
